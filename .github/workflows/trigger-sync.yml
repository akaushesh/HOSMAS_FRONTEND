name: Trigger Frontend Sync

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Sync
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            https://api.github.com/repos/akaushesh/HOSMAS_FRONTEND/dispatches \
            -d '{"event_type":"hosmas-sync"}'
