name: Mirror Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify mirror repository access
        run: |
          git ls-remote https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/akaushesh/HOSMAS_FRONTEND.git

      - name: Push to mirror
        run: |
          git push https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/akaushesh/HOSMAS_FRONTEND.git HEAD:main --force
