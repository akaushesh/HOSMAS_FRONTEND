version: '3'

services:
  hosmas-api:
    image: ccs/hosmas-api
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - hosmas-celery-default
      - hosmas-celery-priority
    volumes:
      - ./static/:/app/static/
      - ./logs/:/app/logs/
      - ./media/:/app/media/
      - ./imported-data/:/app/imported-data/
    network_mode: "host"
    restart: always
  
  hosmas-celery-default:
    image: ccs/hosmas-celery-default
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A config worker -l info --pool=threads --concurrency=1 -E -Q hms-default -n worker-default@%h
    network_mode: "host"
    restart: always
  
  hosmas-celery-priority:
    image: ccs/hosmas-celery-priority
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A config worker -l info --pool=threads --concurrency=1 -E -Q hms-priority -n worker-priority@%h
    network_mode: "host"
    restart: always
