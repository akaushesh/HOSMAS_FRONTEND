version: '3'

services:
  hosmas-api:
    image: ccs/hosmas-api
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - hosmas-celery
    volumes:
      - ./static/:/app/static/
      - ./logs/:/app/logs/
      - ./media/:/app/media/
      - ./imported-data/:/app/imported-data/
    network_mode: "host"
  
  hosmas-celery:
    image: ccs/hosmas-celery
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ./imported-data/:/app/imported-data/
      - ./logs/:/app/logs/
    command: celery -A config worker -l info
    network_mode: "host"
    restart: always
