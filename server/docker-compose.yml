version: '3'

services:
  hosmas-api:
    image: ccs/hosmas-api
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - hosmas-celery
    volumes:
      - ./static/:/app/static/
      - ./logs/:/app/logs/
      - ./media/:/app/media/
      - ./imported-data/:/app/imported-data/
    network_mode: "host"
  
  hosmas-celery-default:
    image: ccs/hosmas-celery-default
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A config worker -l info -E -Q hms-default
    network_mode: "host"
    restart: always
  
  hosmas-celery-priority:
    image: ccs/hosmas-celery-priority
    build:
      context: .
      dockerfile: ./Dockerfile
    command: celery -A config worker -l info -E -Q hms-priority
    network_mode: "host"
    restart: always
